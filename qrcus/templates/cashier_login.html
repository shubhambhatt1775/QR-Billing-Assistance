<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cashier Login | QR Billing Assistant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #fef7ed 0%, #fed7aa 50%, #fdba74 100%);
            color: #1f2937;
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        .header {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 50%, #b45309 100%);
            color: white;
            padding: 25px 0;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
            position: relative;
            animation: slideIn 1s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateY(-30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .header .header-content {
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
            padding: 0 20px;
        }

        .header h2 {
            font-size: 32px;
            margin-bottom: 8px;
            font-weight: 800;
            text-shadow: 0 3px 6px rgba(0, 0, 0, 0.4);
            letter-spacing: 1px;
        }

        .header p {
            font-size: 16px;
            opacity: 0.95;
            font-weight: 400;
        }

        /* MAIN CONTENT */
        .main-content {
            flex: 1;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: white;
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            animation: fadeInUp 1s ease-out 0.5s both;
            position: relative;
            overflow: hidden;
        }

        .login-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
        }

        .login-box::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        }

        @keyframes fadeInUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .login-box h2 {
            color: #f59e0b;
            font-weight: 700;
            margin-bottom: 30px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .login-box h2 i {
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #374151;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input {
            width: 100%;
            padding: 12px 40px 12px 12px;
            border-radius: 10px;
            border: 2px solid #e5e7eb;
            transition: all 0.3s ease;
            font-size: 16px;
            background: #f9fafb;
        }

        input:focus {
            outline: none;
            border-color: #f59e0b;
            box-shadow: 0 0 0 0.2rem rgba(245, 158, 11, 0.25);
            background: white;
        }

        .form-group i.fa-user, .form-group i.fa-lock {
            position: absolute;
            right: 15px;
            top: 40px;
            color: #6b7280;
            transition: color 0.3s ease;
        }

        input:focus + i {
            color: #f59e0b;
        }

        .btn-login {
            width: 100%;
            margin-top: 20px;
            padding: 15px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .btn-login:hover::before {
            left: 100%;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(59, 130, 246, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .message {
            margin-top: 20px;
            text-align: center;
            font-weight: bold;
            padding: 10px;
            border-radius: 10px;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .error {
            color: #dc2626;
            background: #fee2e2;
            border: 1px solid #ef4444;
        }

        .success {
            color: #059669;
            background: #d1fae5;
            border: 1px solid #10b981;
        }

        .footer-text {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #6b7280;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* FOOTER */
        .footer {
            background: linear-gradient(135deg, #1e293b 0%, #334155 50%, #475569 100%);
            color: #cbd5e1;
            padding: 40px 20px;
            text-align: center;
            margin-top: auto;
            position: relative;
            box-shadow: 0 -6px 20px rgba(0, 0, 0, 0.2);
            animation: fadeInUp 1s ease-out 0.3s both;
        }

        .footer .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .footer p {
            font-size: 15px;
            margin: 0;
            font-weight: 500;
        }

        .footer a {
            color: #fbbf24;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .footer a:hover {
            color: #fcd34d;
            text-decoration: underline;
            transform: scale(1.05);
        }

        .footer a i {
            font-size: 18px;
        }

        .footer .social-links {
            display: flex;
            gap: 20px;
            margin-top: 15px;
        }

        .footer .social-links a {
            color: #cbd5e1;
            font-size: 24px;
            transition: all 0.4s ease;
            padding: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
        }

        .footer .social-links a:hover {
            color: #fbbf24;
            transform: scale(1.2) rotate(360deg);
            background: rgba(251, 191, 36, 0.2);
        }

        /* RESPONSIVE DESIGN */
        @media (max-width: 768px) {
            .login-box {
                padding: 20px;
                margin: 20px;
            }
            
            .footer .footer-content {
                flex-direction: column;
            }
        }

        @media (max-width: 480px) {
            .header h2 {
                font-size: 26px;
            }
            
            .btn-login {
                padding: 12px;
                font-size: 16px;
            }
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <div class="header">
        <div class="header-content">
            <h2>QR Billing Assistant</h2>
            <p>Cashier Login</p>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
        <div class="login-box">
            <h2><i class="fas fa-sign-in-alt"></i> Cashier Login</h2>

            <!-- FORM -->
            <form method="POST" id="loginForm">
                {% csrf_token %}
                
                <!-- Show backend error if exists -->
                {% if error %}
                <div class="message error" style="display:block;">
                    <i class="fas fa-times-circle"></i> {{ error }}
                </div>
                {% endif %}

                <div class="form-group">
                    <label for="username"><i class="fas fa-user"></i> Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter username" required>
                    <i class="fas fa-user"></i>
                </div>

                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter password" required>
                    <i class="fas fa-lock"></i>
                </div>

                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>

            <div class="footer-text">
                <i class="fas fa-shield-alt"></i> Secure Login | © 2026 QR Billing Assistant
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 QR Billing Assistant. All rights reserved.</p>
            <div>
                <a href="#"><i class="fas fa-shield-alt"></i> Privacy Policy</a> | 
                <a href="#"><i class="fas fa-file-contract"></i> Terms of Service</a>
            </div>
            <div class="social-links">
                <a href="#"><i class="fab fa-facebook"></i></a>
                <a href="#"><i class="fab fa-twitter"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-linkedin"></i></a>
            </div>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            // Optional: Add client-side validation or loading state
            const button = this.querySelector('.btn-login');
            button.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
            button.disabled = true;

            // For demo, you can add more JS logic here, but form will submit to backend
            // e.preventDefault(); // Uncomment if you want to handle via AJAX
        });

        // Add some creative effects
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.style.transform = 'scale(1.02)';
            });
            input.addEventListener('blur', function() {
                this.parentElement.style.transform = 'scale(1)';
            });
        });
    </script>
</body>
</html>
