<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cashier Logout</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"> <!-- For icons -->
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%); /* Purple gradient for cashier theme */
            animation: fadeIn 1s ease-in-out;
            overflow: hidden;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .box {
            padding: 40px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            display: inline-block;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            animation: slideUp 0.8s ease-out;
            position: relative;
            overflow: hidden;
        }
        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #fbbf24, #f59e0b); /* Yellow gradient for cashier */
        }
        h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        h2 i {
            color: #fbbf24; /* Yellow for cashier */
            animation: checkmark 1s ease-in-out;
        }
        @keyframes checkmark {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        a {
            text-decoration: none;
            color: white;
            background: linear-gradient(45deg, #fbbf24, #f59e0b); /* Yellow gradient for button */
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(251, 191, 36, 0.3);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        a:hover {
            background: linear-gradient(45deg, #f59e0b, #d97706);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(251, 191, 36, 0.4);
        }
        a i {
            transition: transform 0.3s ease;
        }
        a:hover i {
            transform: translateX(5px);
        }
        /* Responsive adjustments */
        @media (max-width: 480px) {
            .box {
                padding: 30px;
            }
            h2 {
                font-size: 20px;
            }
            a {
                padding: 10px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="box">
        <h2><i class="fas fa-check-circle"></i> You have been logged out successfully!!</h2>
        <br>
        <a href="{% url 'index' %}"><i class="fas fa-tachometer-alt"></i> Go to Dashboard</a>
    </div>
</body>
</html>
