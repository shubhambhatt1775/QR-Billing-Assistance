{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | QR Billing</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');

        :root {
            --primary-color: #7c3aed;
            --secondary-color: #a855f7;
            --bg-dark: #0f172a;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #1e293b;
        }

        .login-card {
            background: var(--card-bg);
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 900px;
            overflow: hidden;
            display: flex;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .side-panel {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            width: 45%;
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .side-panel h1 {
            font-weight: 800;
            font-size: 36px;
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        .side-panel p {
            opacity: 0.9;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .visual-element {
            font-size: 100px;
            margin-bottom: 30px;
            filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.2));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-15px);
            }
        }

        .form-panel {
            padding: 60px;
            flex: 1;
        }

        .form-header {
            margin-bottom: 40px;
        }

        .form-header h2 {
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .form-header p {
            color: #64748b;
            font-size: 15px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-weight: 600;
            font-size: 13px;
            color: #64748b;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group-custom {
            position: relative;
        }

        .input-group-custom i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            transition: all 0.3s ease;
        }

        input {
            width: 100%;
            padding: 15px 15px 15px 50px;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 18px;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus {
            background: white;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.1);
        }

        input:focus+i {
            color: var(--primary-color);
        }

        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            padding: 18px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 700;
            margin-top: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(124, 58, 237, 0.3);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(124, 58, 237, 0.4);
            filter: brightness(1.1);
        }

        .auth-footer {
            text-align: center;
            margin-top: 30px;
            font-size: 15px;
            color: #64748b;
        }

        .auth-footer a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 700;
            margin-left: 5px;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .login-card {
                flex-direction: column;
                max-width: 450px;
            }

            .side-panel {
                width: 100%;
                padding: 40px 20px;
            }

            .form-panel {
                padding: 40px 30px;
            }
        }
    </style>
</head>

<body>

    <div class="login-card">
        <!-- Visual Side -->
        <div class="side-panel">
            <div class="visual-element">
                <i class="fas fa-qrcode"></i>
            </div>
            <h1>QR Billing</h1>
            <p>Access your dashboard, manage bills, and track your purchase history with ease.</p>
        </div>

        <!-- Form Side -->
        <div class="form-panel">
            <div class="form-header">
                <h2>Welcome Back</h2>
                <p>Please enter your credentials to login.</p>
            </div>

            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-group-custom">
                        <i class="fas fa-envelope"></i>
                        <input type="email" name="email" placeholder="name@company.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-group-custom">
                        <i class="fas fa-lock"></i>
                        <input type="password" name="password" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="btn-login">
                    SIGN IN NOW <i class="fas fa-sign-in-alt ms-2"></i>
                </button>

                <div class="auth-footer">
                    New to QR Billing? <a href="{% url 'register' %}">Create Account</a>
                </div>
            </form>
        </div>
    </div>

    {% if not_registered %}
    <script>
        alert("{{not_registered}}")
    </script>
    {% endif %}

    {% if login %}
    <script>
        alert("{{login}}")
    </script>
    {% endif %}

</body>

</html>
